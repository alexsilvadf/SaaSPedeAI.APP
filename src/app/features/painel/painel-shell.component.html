<div class="shell" *ngIf="usuario">
  <aside class="side">
    <div class="side__brand">
      <strong>PedeAI</strong>
      <span>Painel</span>
    </div>

    <nav>
      <a
        *ngFor="let item of navVisivel"
        [routerLink]="item.path"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: item.path === '/painel/admin' }"
      >
        {{ item.label }}
        <span class="badge" *ngIf="badge(item) > 0">{{ badge(item) }}</span>
      </a>

      <a *ngIf="mostrarVerCardapio" routerLink="/chama-burger" class="nav-extra">Ver cardápio</a>
      <button type="button" class="nav-extra nav-extra--btn" (click)="sair()">Sair</button>
    </nav>

    <div class="side__user">
      <strong>{{ usuario.nome }}</strong>
      <span>{{ usuario.perfil }}</span>
    </div>
  </aside>

  <main class="content">
    <router-outlet></router-outlet>
  </main>
</div>
