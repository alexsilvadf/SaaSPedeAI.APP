<div class="page">
  <header>
    <div>
      <h1>Produtos</h1>
      <p>Gerencie o cardápio da loja</p>
    </div>
    <button type="button" (click)="novo()">Novo produto</button>
  </header>

  <section class="card form" *ngIf="editando as produto">
    <h2>{{ produto.nome ? 'Editar' : 'Novo' }} produto</h2>
    <label>Nome <input [(ngModel)]="produto.nome" /></label>
    <label>Descrição <textarea rows="2" [(ngModel)]="produto.descricao"></textarea></label>
    <label>Preço <input type="number" step="0.01" [(ngModel)]="produto.preco" /></label>
    <label>
      Categoria
      <select [(ngModel)]="produto.categoriaId">
        <option *ngFor="let cat of categorias" [value]="cat.id">{{ cat.nome }}</option>
      </select>
    </label>
    <label>URL da imagem <input [(ngModel)]="produto.imagemUrl" /></label>
    <label class="check"><input type="checkbox" [(ngModel)]="produto.disponivel" /> Disponível</label>
    <div class="actions">
      <button type="button" (click)="salvar()">Salvar</button>
      <button type="button" class="ghost" (click)="cancelar()">Cancelar</button>
    </div>
  </section>

  <section class="card">
    <article class="row" *ngFor="let produto of produtos">
      <img [src]="produto.imagemUrl" [alt]="produto.nome" />
      <div class="info">
        <strong>{{ produto.nome }}</strong>
        <span>{{ nomeCategoria(produto.categoriaId) }} · {{ produto.preco | brl }}</span>
      </div>
      <div class="actions">
        <button type="button" class="ghost" (click)="toggle(produto)">
          {{ produto.disponivel ? 'Pausar' : 'Ativar' }}
        </button>
        <button type="button" (click)="editar(produto)">Editar</button>
      </div>
    </article>
  </section>
</div>
